<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minglion — 觀音靈籤</title>
  <meta name="description" content="線上觀音靈籤，誠心祈禱、擲筊求允、搖籤筒抽籤，體驗完整的傳統求籤流程。">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>

  <div id="app">

    <!-- MENU Screen -->
    <div class="screen" id="menu-screen">
      <h1 class="menu-title">Minglion</h1>
      <p class="menu-subtitle">觀音靈籤 · 誠心求問</p>
      <button class="menu-start-btn" id="btn-start">開始求籤</button>
    </div>

    <!-- LOADING Screen -->
    <div class="screen hidden" id="loading-screen">
      <div class="loading-container">
        <div class="loading-spinner"></div>
        <p class="loading-text">正在初始化...</p>
      </div>
    </div>

    <!-- PRAYER Screen -->
    <div class="screen hidden" id="prayer-screen">
      <div class="prayer-container">
        <div class="prayer-icon">🙏</div>
        <h2 class="prayer-title">在心中默想你的問題</h2>
        <p class="prayer-hint">向觀音菩薩稟告姓名、住址及所求之事，誠心祈禱後擲筊求允</p>
        <button class="btn-throw" id="btn-start-throw">擲筊求允</button>
      </div>
    </div>

    <!-- THROW Screen (first throw + confirm throws) -->
    <div class="screen hidden" id="throw-screen">
      <div class="throw-container" id="throw-container">
        <div class="throw-round-info" id="throw-round-info"></div>

        <div class="confirm-progress hidden" id="confirm-progress">
          <div class="confirm-dot" id="dot-1"></div>
          <div class="confirm-dot" id="dot-2"></div>
          <div class="confirm-dot" id="dot-3"></div>
        </div>

        <div class="gesture-status" id="gesture-status">
          <div class="gesture-hands">
            <div class="gesture-hand" id="gesture-hand-left">✋</div>
            <div class="gesture-hand" id="gesture-hand-right">✋</div>
          </div>
          <div class="gesture-label" id="gesture-label">偵測手勢中...</div>
        </div>

        <div class="jiaobei-stage" id="jiaobei-stage">
          <div class="jiaobei-block" id="block-left">
            <div class="block-inner">
              <div class="block-face block-flat"></div>
              <div class="block-face block-round">
                <div class="block-round-surface"></div>
              </div>
            </div>
          </div>
          <div class="jiaobei-block" id="block-right">
            <div class="block-inner">
              <div class="block-face block-flat"></div>
              <div class="block-face block-round">
                <div class="block-round-surface"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="throw-prompt" id="throw-prompt">雙手握拳，張開即擲</div>
      </div>
    </div>

    <!-- DRAW Screen (籤筒) -->
    <div class="screen hidden" id="draw-screen">
      <div class="draw-container">
        <p class="draw-instruction">菩薩允准，請搖籤筒抽籤</p>
        <div class="stick-container" id="stick-container">
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
          <div class="stick"></div>
        </div>
        <p class="draw-hint" id="draw-hint">握拳搖動籤筒，張開手掌抽籤</p>
        <div class="gesture-status" id="draw-gesture-status">
          <div class="gesture-hand">✋</div>
          <div class="gesture-label">將手伸到鏡頭前</div>
        </div>
      </div>
    </div>

    <!-- STICK Screen (show drawn stick) -->
    <div class="screen hidden" id="stick-screen">
      <div class="stick-screen-container">
        <div class="stick-number-large" id="stick-number"></div>
        <p class="stick-question">是否是這支籤？</p>
        <div class="stick-actions">
          <button class="btn-confirm" id="btn-stick-yes">是，擲筊確認</button>
          <button class="btn-redraw" id="btn-stick-no">不是，重新抽籤</button>
        </div>
      </div>
    </div>

    <!-- RESULT Screen -->
    <div class="screen hidden" id="result-screen">
      <div class="result-container">
        <div class="result-lot-number" id="result-lot-number"></div>
        <div class="result-fortune-badge" id="result-fortune-badge"></div>
        <h2 class="result-title" id="result-title"></h2>

        <div class="poem-container" id="poem-container"></div>

        <div class="interpretation-section">
          <div class="interpretation-label">【解曰】</div>
          <div class="interpretation-text" id="result-interpretation"></div>
        </div>

        <div class="advice-grid" id="advice-grid"></div>

        <!-- App 推廣 -->
        <div class="result-ad-slot">
          <a class="app-promo" href="https://apps.apple.com/tw/app/%E8%90%8A%E6%81%A9%E6%97%A5%E8%A8%98/id6758570300" target="_blank" rel="noopener">
            <div class="app-promo-body">
              <div class="app-promo-hook">想更深入解讀這支籤？</div>
              <div class="app-promo-desc">AI 為你每日分析籤詩，記錄心靈成長軌跡</div>
            </div>
            <img class="app-promo-badge" src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/zh-tw?size=250x83" alt="Download on the App Store">
          </a>
        </div>

        <div class="result-actions">
          <button class="btn-again" id="btn-again">再求一籤</button>
          <button class="btn-home" id="btn-home">回首頁</button>
        </div>
      </div>
    </div>

    <!-- Meditation Overlay -->
    <div class="meditation-overlay hidden" id="meditation-overlay">
      <div class="meditation-text" id="meditation-text"></div>
    </div>

    <!-- Video Feed (hidden, for gesture detection) -->
    <video id="webcam" playsinline autoplay muted style="display:none;"></video>

    <!-- Mouse Fallback Notice -->
    <div class="fallback-notice" id="fallback-notice">
      滑鼠模式 — 無法使用鏡頭，已切換為點擊操作
    </div>

  </div>

  <footer class="site-footer">
    <nav class="site-footer-nav">
      <a class="site-footer-link" href="/tarot">塔羅牌</a>
      <span class="site-footer-sep">|</span>
      <a class="site-footer-link" href="/jiaobei">線上擲筊</a>
      <span class="site-footer-sep">|</span>
      <span class="site-footer-link active">觀音靈籤</span>
    </nav>
    <div class="site-footer-copy">&copy; 2026 Minglion</div>
  </footer>

  <script src="js/lots.js"></script>
  <script src="js/jiaobei.js"></script>
  <script src="js/gesture.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
