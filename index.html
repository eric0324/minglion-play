<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minglion Play — 互動小工具</title>
  <meta name="description" content="Minglion 互動體驗工具集：塔羅占卜、線上擲筊，更多即將推出。">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fafafa;
      --bg-card: #ffffff;
      --border: #e0e0e0;
      --border-light: #eeeeee;
      --text: #1a1a1a;
      --text-secondary: #888888;
      --text-muted: #b0b0b0;
      --accent: #1a1a1a;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand {
      text-align: center;
      margin-bottom: 3rem;
    }

    .brand-title {
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--text);
      margin-bottom: 0.3em;
    }

    .brand-subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
    }

    .tools {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .tool-card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 1.4rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .tool-card:hover {
      border-color: var(--border);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .tool-card:active {
      transform: scale(0.99);
    }

    .tool-icon {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 1px solid var(--border-light);
      border-radius: 10px;
      background: var(--bg);
    }

    .tool-info {
      flex: 1;
      min-width: 0;
    }

    .tool-name {
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 0.25em;
      letter-spacing: 0.05em;
    }

    .tool-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .tool-arrow {
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    .tool-card:hover .tool-arrow {
      transform: translateX(3px);
    }

    .footer {
      margin-top: 3rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      body {
        padding: 2rem 1rem;
      }

      .brand-title {
        font-size: 2.2rem;
      }

      .tool-card {
        padding: 1.2rem 1.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="brand">
      <h1 class="brand-title">Minglion</h1>
      <p class="brand-subtitle">互動體驗工具集</p>
    </header>

    <nav class="tools">
      <a class="tool-card" href="/tarot">
        <div class="tool-icon">✦</div>
        <div class="tool-info">
          <div class="tool-name">塔羅占卜</div>
          <div class="tool-desc">透過手勢與塔羅牌對話，三種牌陣深度解讀</div>
        </div>
        <div class="tool-arrow">→</div>
      </a>
      <a class="tool-card" href="/jiaobei">
        <div class="tool-icon">☽</div>
        <div class="tool-info">
          <div class="tool-name">線上擲筊</div>
          <div class="tool-desc">虔誠擲筊，聆聽神意，支援多種問卜模式</div>
        </div>
        <div class="tool-arrow">→</div>
      </a>
    </nav>

    <footer class="footer">
      &copy; 2026 Minglion
    </footer>
  </div>

</body>
</html>
